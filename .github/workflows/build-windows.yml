name: Build Windows VST3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build Release
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --build build --config Release

      - name: Debug - List build output
        shell: pwsh
        run: |
          Write-Host "=== Build directory structure ==="
          Get-ChildItem -Path "build" -Recurse -Directory | Where-Object {$_.Name -like "*artefact*" -or $_.Name -like "*VST3*"} | Select-Object FullName
          Write-Host "=== Searching for VST3 bundles ==="
          Get-ChildItem -Path "build" -Recurse -Directory -Filter "*.vst3" | Select-Object FullName

      - name: Find and package VST3
        id: package-vst3
        shell: pwsh
        run: |
          $vst3Dirs = Get-ChildItem -Path "build" -Recurse -Directory -Filter "AnalogSynth.vst3" -ErrorAction SilentlyContinue
          if (-not $vst3Dirs) {
            Write-Error "No AnalogSynth.vst3 directory found!"
            exit 1
          }
          $vst3Dir = $vst3Dirs[0].FullName
          $parentDir = Split-Path $vst3Dir
          Write-Host "Found VST3 at: $vst3Dir"
          
          # DEBUG: Show full VST3 bundle structure
          Write-Host "=== FULL VST3 TREE ==="
          Get-ChildItem -Path "$vst3Dir" -Recurse | Select-Object FullName, Length
          
          # DEBUG: Check plugin.xml
          Write-Host "=== plugin.xml CONTENTS ==="
          $pluginXml = "$vst3Dir\Contents\x86_64-win\plugin.xml"
          if (Test-Path $pluginXml) {
            Get-Content $pluginXml
          } else {
            Write-Warning "plugin.xml NOT FOUND at $pluginXml"
            # Check other locations
            Get-ChildItem -Path "$vst3Dir\Contents" -Recurse -Filter "plugin.xml" | Select-Object FullName
          }
          
          # DEBUG: Check moduleinfo.json
          Write-Host "=== moduleinfo.json CONTENTS ==="
          $moduleInfo = "$vst3Dir\Contents\x86_64-win\moduleinfo.json"
          if (Test-Path $moduleInfo) {
            Get-Content $moduleInfo
          } else {
            Write-Warning "moduleinfo.json NOT FOUND at $moduleInfo"
            Get-ChildItem -Path "$vst3Dir\Contents" -Recurse -Filter "moduleinfo.json" | Select-Object FullName
          }
          
          $dll = Get-ChildItem -Path "$vst3Dir\Contents\x86_64-win" -Filter "*.vst3" -ErrorAction SilentlyContinue
          if ($dll) {
            Write-Host "Found plugin DLL: $($dll.FullName)"
          } else {
            Write-Warning "No DLL found in x86_64-win, checking all Contents..."
            Get-ChildItem -Path "$vst3Dir\Contents" -Recurse -Filter "*.vst3" -ErrorAction SilentlyContinue | Select-Object FullName
          }
          
          $zipPath = "$(Get-Location)\AnalogSynth-Windows.vst3.zip"
          Compress-Archive -Path "$parentDir\AnalogSynth.vst3" -DestinationPath $zipPath -Force
          Write-Host "Created zip: $zipPath"
          echo "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnalogSynth-Windows-VST3
          path: ${{ steps.package-vst3.outputs.zip_path }}
          retention-days: 30