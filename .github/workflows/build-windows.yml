name: Build Windows VST3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache JUCE FetchContent + CMake build
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/JUCE
            ${{ runner.temp }}/sccache
            build
          key: ${{ runner.os }}-juce-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-juce-cmake-

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Install Ninja & sccache
        shell: pwsh
        run: |
          choco install ninja sccache -y --no-progress
          echo "C:\ProgramData\sccache" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          set SCCACHE_DIR=%RUNNER_TEMP%\sccache
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build Release
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          set SCCACHE_DIR=%RUNNER_TEMP%\sccache
          echo "=== BUILD START: %DATE% %TIME% ==="
          cmake --build build --config Release -j%NUMBER_OF_PROCESSORS%
          echo "=== BUILD END: %DATE% %TIME% ==="

      - name: Debug - List build output
        shell: pwsh
        run: |
          Write-Host "=== Build directory structure ==="
          Get-ChildItem -Path "build" -Recurse -Directory | Where-Object {$_.Name -like "*artefact*" -or $_.Name -like "*VST3*"} | Select-Object FullName
          Write-Host "=== Searching for VST3 bundles ==="
          Get-ChildItem -Path "build" -Recurse -Directory -Filter "*.vst3" | Select-Object FullName

      - name: Fix VST3 bundle + package
        id: package-vst3
        shell: pwsh
        run: |
          $vst3Dirs = Get-ChildItem -Path "build" -Recurse -Directory -Filter "AnalogSynth.vst3" -ErrorAction SilentlyContinue
          if (-not $vst3Dirs) {
            Write-Error "No AnalogSynth.vst3 directory found!"
            exit 1
          }
          $vst3Dir = $vst3Dirs[0].FullName
          $parentDir = Split-Path $vst3Dir
          Write-Host "Found VST3 at: $vst3Dir"

          $x64Dir = Join-Path $vst3Dir "Contents\x86_64-win"
          $resourcesDir = Join-Path $vst3Dir "Contents\Resources"

          # 1. Copy moduleinfo.json from Resources to x86_64-win
          $moduleInfoSrc = Join-Path $resourcesDir "moduleinfo.json"
          if (Test-Path $moduleInfoSrc) {
            Copy-Item $moduleInfoSrc $x64Dir -Force
            Write-Host "✓ Copied moduleinfo.json to x86_64-win"
          } else {
            Write-Warning "✗ moduleinfo.json not found in Resources!"
          }

          # 2. Create plugin.xml (required by Bitwig for metadata scanning)
          $pluginXmlPath = Join-Path $x64Dir "plugin.xml"
          $xmlLines = @(
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<plugin version="1" xmlns="http://www.steinberg.net/vst3/2008/plugin">',
            '  <class name="AnalogSynthAudioProcessor" cid="ABCDEF019182FAEB4D616E75416E5379"/>',
            '  <component name="AnalogSynthAudioProcessor" cid="ABCDEF019182FAEB4D616E75416E5379">',
            '    <audio><bus name="Stereo Out" type="kMain" channel-count="2" flags="kOutput"/></audio>',
            '    <event><bus name="Event In" type="kMain" channel-count="16" flags="kInput"/></event>',
            '  </component>',
            '</plugin>'
          )
          Set-Content -Path $pluginXmlPath -Value ($xmlLines -join "`n") -Encoding UTF8
          Write-Host "✓ Created plugin.xml in x86_64-win"

          # Also copy plugin.xml to Resources for completeness
          Copy-Item $pluginXmlPath $resourcesDir -Force
          Write-Host "✓ Copied plugin.xml to Resources"

          # 3. Verify final state
          Write-Host "=== FINAL VST3 TREE ==="
          Get-ChildItem -Path "$vst3Dir" -Recurse | Select-Object FullName, Length

          $dll = Get-ChildItem -Path $x64Dir -Filter "*.vst3" -ErrorAction SilentlyContinue
          if ($dll) {
            Write-Host "✓ Found plugin DLL: $($dll.Name) ($($dll.Length) bytes)"
          }

          $zipPath = "$(Get-Location)\AnalogSynth-Windows.vst3.zip"
          Compress-Archive -Path "$parentDir\AnalogSynth.vst3" -DestinationPath $zipPath -Force
          Write-Host "Created zip: $zipPath"
          echo "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnalogSynth-Windows-VST3
          path: ${{ steps.package-vst3.outputs.zip_path }}
          retention-days: 30